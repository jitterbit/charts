apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: '{{ .Release.Name }}'
  annotations:
    description: "{{ .Chart.Description }}"
    image-digest: "{{ .Values.image.digest }}"
    image-tag: "{{ .Values.image.tag }}"
  labels:
    app: '{{ template "agent-group.name" . }}'
    chart: '{{ template "agent-group.chart" . }}'
    component: agent-group
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
spec:
  serviceName: {{ template "agent-group.name" . }}
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: '{{ template "agent-group.name" . }}'
      release: "{{ .Release.Name }}"
  volumeClaimTemplates:
    - metadata:
        name: '{{ template "agent-group.name" .}}-vol'
      spec:
        {{- if .Values.volume.storageClassName }}
        storageClassName: {{ .Values.volume.storageClassName }}
        {{- end }}
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.volume.storage }}
  template:
    metadata:
      {{- if or .Values.agent.jitterbitconf .Values.agent.registerjson }}
      annotations:
        {{- if .Values.agent.jitterbitconf }}
        checksum/jitterbitconf-secret: '{{ include (print $.Template.BasePath "/jitterbitconf-secret.yaml") . | sha256sum }}'
        {{- end }}
        {{- if .Values.agent.registerjson }}
        checksum/registerjson-secret: '{{ include (print $.Template.BasePath "/registerjson-secret.yaml") . | sha256sum }}'
        {{- end }}
      {{- end }}
      labels:
        app: '{{ template "agent-group.name" . }}'
        release: "{{ .Release.Name }}"
    spec:
      terminationGracePeriodSeconds: 3600 # 1 hour
      initContainers:
        - name: "{{ .Chart.Name }}-init"
          image: {{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag }}{{ end }}
          command: ["/bin/bash", "/scripts/init-script.sh"]
          volumeMounts:
          - name: agent-group-initscript
            mountPath: /scripts/init-script.sh
            subPath: init-script.sh
          - name: '{{ template "agent-group.name" .}}-vol'
            mountPath: /data-opt-jitterbit           
      containers:
        - name: "{{ .Chart.Name }}"
          image: {{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag }}{{ end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http-healthz
              protocol: TCP
              containerPort: 3000
          {{- if .Values.env }}
          env:
            {{- toYaml .Values.env | trimSuffix "\n" | nindent 12 }}
          {{- end }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | trimSuffix "\n" | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | trimSuffix "\n" | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | trimSuffix "\n" | nindent 12 }}
          volumeMounts:
            - name: '{{ template "agent-group.name" .}}-vol'
              mountPath: /opt/jitterbit          
            {{- if .Values.agent.registerjson }}
            - name: agent-group-registerjson
              mountPath: /conf/register.json
              subPath: register.json
              readOnly: true
            {{- end }}
            {{- if .Values.agent.customConfigFiles.jitterbitConf }}
            - name: agent-group-jitterbit-conf
              mountPath: /opt/jitterbit/jitterbit.conf
              subPath: jitterbit.conf
              readOnly: true
            {{- end }}
            {{- if .Values.agent.customConfigFiles.jitterbitAgentConfigProperties }}            
            - name: agent-group-jitterbit-agent-config-properties
              mountPath: /opt/jitterbit/Resources/jitterbit-agent-config.properties
              subPath: jitterbit-agent-config.properties
              readOnly: true
            {{- end }}
            {{- if .Values.agent.customConfigFiles.httpdMpmConf }}            
            - name: agent-group-httpd-mpm-conf
              mountPath: /opt/jitterbit/apache/conf/extra/httpd-mpm.conf
              subPath: httpd-mpm.conf
              readOnly: true
            {{- end }}
      volumes:
        - name: agent-group-initscript
          configMap:
            name: {{ .Release.Name }}-init-script-sh
            defaultMode: 0755      
        {{- if .Values.agent.registerjson }}
        - name: agent-group-registerjson
          secret:
            secretName: '{{ .Release.Name }}-registerjson'
        {{- end }}
        {{- if .Values.agent.customConfigFiles.jitterbitConf }}
        - name: agent-group-jitterbit-conf
          configMap:
            name:  {{ .Values.agent.customConfigFiles.jitterbitConf }}
        {{- end }}
        {{- if .Values.agent.customConfigFiles.jitterbitAgentConfigProperties }}
        - name: agent-group-jitterbit-agent-config-properties
          configMap:
            name:  {{ .Values.agent.customConfigFiles.jitterbitAgentConfigProperties }}
        {{- end }}
        {{- if .Values.agent.customConfigFiles.httpdMpmConf }}
        - name: agent-group-httpd-mpm-conf
          configMap:
            name:  {{ .Values.agent.customConfigFiles.httpdMpmConf }}
        {{- end }}
      imagePullSecrets:
        - name: '{{ template "agent-group.name" . }}'
      affinity:
        {{- tpl (toYaml .Values.affinity) . | trimSuffix "\n" | nindent 8 }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.dnsPolicy }}
      dnsPolicy: {{.Values.dnsPolicy }}
      {{- end }}
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}

